<!DOCTYPE html>    
<html>    
    <head>    
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>

        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">    
        <meta name="HandheldFriendly" content="true">    
    
        <meta name="apple-mobile-web-app-capable" content="yes">    
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">    
        <meta name="apple-mobile-web-app-title" content="roBrowser">    
        <meta name="mobile-web-app-capable" content="yes">    
    
        <meta name="description" content="roBrowser">    
        <meta name="keywords" content="roBrowser">

        <meta property="og:locale" content="en_US">    
    
        <link rel="apple-touch-icon" href="./icon.png">    
        <link rel="manifest" href="./manifest.webmanifest">    
  
        <style>    
            html, body {    
                margin: 0; padding: 0; border: 0;    
                height: 100%; width: 100%; overflow: hidden;    
            }    
            #ro-preloader {    
                position: fixed;    
                top: 0; left: 0;    
                width: 100%; height: 100%;    
                z-index: 99999;    
                background: rgba(6, 8, 16, 0.97);    
                display: flex;    
                align-items: center;    
                justify-content: center;    
                flex-direction: column;    
            }    
            #ro-preloader .pre-spinner {    
                width: 48px; height: 48px;    
                margin: 0 auto 16px;    
                border: 4px solid rgba(232, 184, 75, 0.2);    
                border-top-color: #e8b84b;    
                border-radius: 50%;    
                animation: ro-pre-spin 0.8s linear infinite;    
            }    
            #ro-preloader .pre-text {    
                font-family: serif;    
                font-size: 16px;    
                letter-spacing: 3px;    
                text-transform: uppercase;    
                color: #e8b84b;    
            }    
            #ro-preloader .pre-text span {    
                display: inline-block;    
                animation: ro-pre-wave 1.2s ease-in-out infinite;    
                animation-delay: calc(var(--i) * 0.08s);    
            }    
            @keyframes ro-pre-spin {    
                to { transform: rotate(360deg); }    
            }    
            @keyframes ro-pre-wave {    
                0%, 60%, 100% { transform: translateY(0); }    
                30% { transform: translateY(-8px); }    
            }    
            #ro-preloader.fade-out {    
                opacity: 0;    
                transition: opacity 0.3s ease;    
            }    
            .app-launcher {    
                display: flex;    
                flex-direction: column;    
                align-items: center;    
                justify-content: center;    
                min-height: 100vh;    
                background: rgba(6, 8, 16, 0.97);    
                font-family: serif;    
                color: #e8b84b;    
            }    
            .app-launcher h1 {    
                font-size: 28px;    
                letter-spacing: 3px;    
                text-transform: uppercase;    
                margin-bottom: 32px;    
            }    
            .button-grid {    
                display: flex;    
                flex-wrap: wrap;    
                gap: 16px;    
                justify-content: center;    
                max-width: 600px;    
            }    
            .app-btn {    
                padding: 14px 28px;    
                font-family: serif;    
                font-size: 16px;    
                letter-spacing: 2px;    
                color: #e8b84b;    
                background: transparent;    
                border: 2px solid rgba(232, 184, 75, 0.4);    
                border-radius: 8px;    
                cursor: pointer;    
                transition: all 0.3s ease;    
            }    
            .app-btn:hover {    
                background: rgba(232, 184, 75, 0.15);    
                border-color: #e8b84b;    
            }    
        </style>    
    </head>    
    <body>    
        <div class="app-launcher">    
            <h1>roBrowser App Launcher</h1>    
            <div class="button-grid">    
                <button class="app-btn" onclick="launchApp('ONLINE')">Online</button>
                <button class="app-btn" onclick="launchApp('GRANNYMODELVIEWER')">Granny Model Viewer</button>
                <button class="app-btn" onclick="launchApp('GRFVIEWER')">GRF Viewer</button>
                <button class="app-btn" onclick="launchApp('MAPVIEWER')">Map Viewer</button>
                <button class="app-btn" onclick="launchApp('MODELVIEWER')">Model Viewer</button>
                <button class="app-btn" onclick="launchApp('STRVIEWER')">STR Viewer</button>
                <button class="app-btn" onclick="launchApp('EFFECTVIEWER')">Effect Viewer</button>    
            </div>    
        </div>    
  
        <script type="text/javascript">    
            function launchApp(appName) {    
                var w = 800, h = 600;    
                var top = (screen.height - h) / 2;    
                var left = (screen.width - w) / 2;    
                window.open(    
                    'api.html?app=' + appName,    
                    '_blank',    
                    'width=' + w + ',height=' + h + ',top=' + top + ',left=' + left + ',menubar=0,toolbar=0,location=0,status=0,resizable=1,scrollbars=0'    
                );    
            }    
        </script>    
    </body>    
</html>
