name: Deploy to GitHub Pages

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

on:
  push:
    branches: ["**"]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build -- --all -H

      - name: Create demo Config.local.js
        run: |
          # Source the demo servers/settings from the single shared demo config
          # (applications/shared/demo-config.js -> window.RODemoConfig) so this
          # deployment stays in sync with the demo.html / electron builds.
          cp applications/shared/demo-config.js dist/Web/Config.local.js
          cat >> dist/Web/Config.local.js << 'EOF'

          // GitHub Pages public demo: trim heavy/local-only features on top of
          // the shared demo config (window.RODemoConfig defined above).
          window.ROConfigLocal = Object.assign({}, window.RODemoConfig, {
              enableAchievements: false,
              enableBank: false,
              enableCashShop: false,
              enableCheckAttendance: false,
              enableDmgSuffix: false,
              enableHomunAutoFeed: false,
              enableMapName: false,
              enableRoulette: false,
              loadLua: false,
              saveFiles: true
          });
          EOF

      - name: Prepare branch subfolder
        run: |
          SAFE_BRANCH="$(printf '%s' "$GITHUB_REF_NAME" | tr '/' '-' | sed -E 's/[^A-Za-z0-9._-]+/-/g')"
          if [ -z "$SAFE_BRANCH" ] || [ "$SAFE_BRANCH" = "." ] || [ "$SAFE_BRANCH" = ".." ]; then
            exit 1
          fi
          mkdir -p site/"$SAFE_BRANCH"
          rsync -a dist/Web/ site/"$SAFE_BRANCH"/

      - name: Prepare gh-pages workdir
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SAFE_BRANCH="$(printf '%s' "$GITHUB_REF_NAME" | tr '/' '-' | sed -E 's/[^A-Za-z0-9._-]+/-/g')"
          if [ -z "$SAFE_BRANCH" ] || [ "$SAFE_BRANCH" = "." ] || [ "$SAFE_BRANCH" = ".." ]; then
            exit 1
          fi
          REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git ls-remote --exit-code --heads "$REMOTE" gh-pages >/dev/null 2>&1; then
            git clone --depth 1 --branch gh-pages "$REMOTE" ghpages
          else
            mkdir -p ghpages
            cd ghpages
            git init
            git checkout -b gh-pages
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            mkdir -p "$SAFE_BRANCH"
            rsync -a ../site/"$SAFE_BRANCH"/ "$SAFE_BRANCH"/
            touch .nojekyll
            bash ../.github/actions/generate-pages-index/generate-pages-index.sh .
            git add -A
            git commit -m "Initialize gh-pages with ${GITHUB_REF_NAME}"
            git remote add origin "$REMOTE"
            git push -u origin gh-pages
            cd ..
            rm -rf ghpages
            git clone --depth 1 --branch gh-pages "$REMOTE" ghpages
          fi

      - name: Sync to gh-pages
        run: |
          SAFE_BRANCH="$(printf '%s' "$GITHUB_REF_NAME" | tr '/' '-' | sed -E 's/[^A-Za-z0-9._-]+/-/g')"
          if [ -z "$SAFE_BRANCH" ] || [ "$SAFE_BRANCH" = "." ] || [ "$SAFE_BRANCH" = ".." ]; then
            exit 1
          fi
          rm -rf ghpages/"$SAFE_BRANCH"
          mkdir -p ghpages/"$SAFE_BRANCH"
          rsync -a site/"$SAFE_BRANCH"/ ghpages/"$SAFE_BRANCH"/
          touch ghpages/.nojekyll

      - name: Generate branch index
        uses: ./.github/actions/generate-pages-index
        with:
          pages-dir: ghpages

      - name: Commit and push (retry, no rebase)
        run: |
          set -euo pipefail
          SAFE_BRANCH="$(printf '%s' "$GITHUB_REF_NAME" | tr '/' '-' | sed -E 's/[^A-Za-z0-9._-]+/-/g')"
          if [ -z "$SAFE_BRANCH" ] || [ "$SAFE_BRANCH" = "." ] || [ "$SAFE_BRANCH" = ".." ]; then
            exit 1
          fi

          cd ghpages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for i in 1 2 3 4 5; do
            git fetch origin gh-pages
            git reset --hard origin/gh-pages

            rm -rf -- "$SAFE_BRANCH"
            mkdir -p "$SAFE_BRANCH"
            rsync -a ../site/"$SAFE_BRANCH"/ "$SAFE_BRANCH"/
            touch .nojekyll
            bash ../.github/actions/generate-pages-index/generate-pages-index.sh .

            git add -A
            if git diff --cached --quiet; then
              exit 0
            fi

            git commit -m "Deploy ${GITHUB_REF_NAME}"

            if git push origin gh-pages; then
              exit 0
            fi

            sleep $((i * 2))
          done

          exit 1
