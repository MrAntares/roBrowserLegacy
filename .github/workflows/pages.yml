name: Deploy to GitHub Pages

concurrency:
    group: ${{ github.repository }}-${{ github.workflow }}-${{ github.ref_name }}
    cancel-in-progress: true

on:
    push:
        branches: ['**']

permissions:
    contents: write

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Install dependencies
              run: npm install

            - name: Build project
              run: npm run build -- -O -H

            - name: Create demo Config.local.js
              run: |
                  cat > dist/Web/Config.local.js << 'EOF'  
                  window.ROConfigLocal = {  
                      development: true,  
                      remoteClient: 'https://grf.robrowser.com/',  
                      servers: [  
                          {  
                              display: 'roBrowser Demo Server',  
                              desc: 'demo server',  
                              address: '127.0.0.1',  
                              port: 6900,  
                              version: 25,  
                              langtype: 12,  
                              packetver: 20130618,  
                              renewal: false,  
                              worldMapSettings: { episode: 12 },  
                              packetKeys: false,  
                              socketProxy: 'wss://connect.robrowser.com',  
                              adminList: [2000000]  
                          },  
                          {  
                              display: 'Ragna.ro',  
                              desc: 'Ragna.ro [1/1/1] Renewal II',  
                              address: 'ragna.ro',  
                              port: 6900,  
                              version: 30,  
                              langtype: 240,  
                              packetver: 20120410,  
                              renewal: true,  
                              worldMapSettings: { episode: 15 },  
                              packetKeys: false,  
                              socketProxy: 'wss://ragna.ro:5999',  
                              remoteClient: 'https://client.ragna.ro/',  
                              adminList: [2000000, 2000001],  
                              FirstPersonCamera: true,  
                              ThirdPersonCamera: true  
                          },  
                          {  
                              display: 'NiktoutRO Chaos',  
                              desc: 'NiktoutRO Chaos [100k/100k/10%]',  
                              address: 'chaos.niktoutro.com',  
                              port: 6905,  
                              version: 55,  
                              langtype: 1,  
                              packetver: 20151104,  
                              renewal: true,  
                              socketProxy: 'wss://classicweb.niktoutro.com:5999',  
                              remoteClient: 'https://classicweb.niktoutro.com/chaosclient/',  
                              registrationweb: 'https://niktoutro.com/?module=account&action=create',  
                              packetKeys: true,  
                              adminList: [2000002]  
                          }  
                      ],  
                      packetDump: false,  
                      skipServerList: true,  
                      skipIntro: false,  
                      aura: {},  
                      autoLogin: [],  
                      BGMFileExtension: ['mp3'],  
                      calculateHash: false,  
                      CameraMaxZoomOut: 5,  
                      charBlockSize: 0,  
                      clientHash: null,  
                      clientVersionMode: 'PacketVer',  
                      disableConsole: false,  
                      enableAchievements: false,
                      enableBank: false,  
                      enableCashShop: false,  
                      enableCheckAttendance: false,  
                      enableDmgSuffix: false,  
                      enableHomunAutoFeed: false,  
                      enableMapName: false,  
                      FirstPersonCamera: false,  
                      grfList: null,  
                      hashFiles: [],  
                      loadLua: false,  
                      onReady: null,  
                      plugins: {},  
                      registrationweb: '',  
                      saveFiles: true,  
                      ThirdPersonCamera: false,  
                      transitionDuration: 500  
                  };
                  EOF

            - name: Prepare branch subfolder
              run: |
                  BRANCH="${GITHUB_REF_NAME//\//-}"
                  mkdir -p site/"$BRANCH"
                  rsync -a dist/Web/ site/"$BRANCH"/

            - name: Prepare gh-pages workdir
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -e
                  BRANCH="${GITHUB_REF_NAME//\//-}"
                  REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
                  if git ls-remote --exit-code --heads "$REMOTE" gh-pages >/dev/null 2>&1; then
                    git clone --depth 1 --branch gh-pages "$REMOTE" ghpages
                  else
                    mkdir -p ghpages
                    cd ghpages
                    git init
                    git checkout -b gh-pages
                    git config user.name "github-actions"
                    git config user.email "github-actions@github.com"
                    mkdir -p "$BRANCH"
                    rsync -a ../site/"$BRANCH"/ "$BRANCH"/
                    touch .nojekyll
                    git add -A
                    git commit -m "Initialize gh-pages with ${GITHUB_REF_NAME}"
                    git remote add origin "$REMOTE"
                    git push -u origin gh-pages
                    cd ..
                    rm -rf ghpages
                    git clone --depth 1 --branch gh-pages "$REMOTE" ghpages
                  fi

            - name: Sync to gh-pages
              run: |
                  BRANCH="${GITHUB_REF_NAME//\//-}"
                  rm -rf ghpages/"$BRANCH"
                  mkdir -p ghpages/"$BRANCH"
                  rsync -a site/"$BRANCH"/ ghpages/"$BRANCH"/
                  touch ghpages/.nojekyll

            - name: Generate branch index
              run: |
                  cd ghpages
                  mapfile -t DIRS < <(find . -maxdepth 1 -mindepth 1 -type d -printf '%f\n' | sort)

                  has_dir() { [ -d "$1" ]; }

                  {
                    echo '<!doctype html>'
                    echo '<html lang="en">'
                    echo '<head>'
                    echo '  <meta charset="utf-8" />'
                    echo '  <meta name="viewport" content="width=device-width, initial-scale=1" />'
                    echo '  <title>Branch Demo Browser</title>'
                    echo '  <style>'
                    echo '    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;max-width:980px;margin:40px auto;padding:0 16px;}'
                    echo '    h1{margin:0 0 8px;}'
                    echo '    .hint{color:#666;margin:0 0 24px;}'
                    echo '    .featured{display:flex;gap:12px;flex-wrap:wrap;margin:18px 0 26px;}'
                    echo '    .pill{display:inline-flex;align-items:center;gap:10px;padding:12px 14px;border-radius:999px;border:1px solid #ddd;background:#fff;text-decoration:none;color:#111;font-weight:700;}'
                    echo '    .pill:hover{border-color:#999;}'
                    echo '    .tag{font-size:12px;padding:2px 8px;border-radius:999px;background:#e8b84b;color:#111;font-weight:800;}'
                    echo '    ul{list-style:none;padding:0;margin:0;}'
                    echo '    li{margin:10px 0;padding:12px 14px;border:1px solid #ddd;border-radius:10px;display:flex;justify-content:space-between;gap:12px;align-items:center;}'
                    echo '    a{color:#0969da;text-decoration:none;font-weight:600;}'
                    echo '    a:hover{text-decoration:underline;}'
                    echo '    .name{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13px;color:#111;}'
                    echo '  </style>'
                    echo '</head>'
                    echo '<body>'
                    echo '  <h1>Branch Demo Browser</h1>'
                    echo '  <p class="hint">Available deployed branch previews (folders on <code>gh-pages</code>).</p>'

                    echo '  <div class="featured">'
                    if has_dir "main"; then
                      echo '    <a class="pill" href="./main/"><span class="tag">MAIN</span><span>Open main demo</span></a>'
                    fi
                    if has_dir "master"; then
                      echo '    <a class="pill" href="./master/"><span class="tag">MASTER</span><span>Open master demo</span></a>'
                    fi
                    echo '  </div>'

                    echo '  <ul>'
                    for d in "${DIRS[@]}"; do
                      if [ "$d" = "main" ] || [ "$d" = "master" ]; then
                        continue
                      fi
                      if [ "$d" = ".git" ] || [ "$d" = ".github" ] || [ "$d" = ".ssh" ]; then
                        continue
                      fi
                      if [ "$d" = "." ] || [ "$d" = ".." ]; then
                        continue
                      fi
                      echo "    <li><span class=\"name\">${d}</span><a href=\"./${d}/\">Open demo</a></li>"
                    done
                    echo '  </ul>'
                    echo '</body>'
                    echo '</html>'
                  } > index.html

            - name: Commit and push
              run: |
                  cd ghpages
                  git config user.name "github-actions"
                  git config user.email "github-actions@github.com"
                  git add -A
                  if ! git diff --cached --quiet; then
                    git commit -m "Deploy ${GITHUB_REF_NAME}"
                    git push origin gh-pages
                  fi
