name: Devin PR Labeler
on:
  issue_comment:
    types: [created]

jobs:
  label_based_on_devin:
    if: github.event.issue.pull_request
    runs-on: ubuntu-latest
    steps:
      - name: Handle Devin Labels
        uses: actions/github-script@v6
        with:
          script: |
            const comment = context.payload.comment.body.toLowerCase();
            const issue_number = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            if (comment.includes('no bugs found')) {
              await github.rest.issues.addLabels({
                owner, repo, issue_number,
                labels: ['Devin Check Passed']
              });
            }

            if (comment.includes('potential issues') && !comment.includes('no bugs found')) {
              await github.rest.issues.addLabels({
                owner, repo, issue_number,
                labels: ['Devin Check Failed - TOFIX']
              });
   	    }

            if (comment.includes('potential issues') && !comment.includes('no bugs found')) {
              await github.rest.issues.addLabels({
                owner, repo, issue_number,
                labels: ['Devin Check Failed - TOFIX']
              });
            }