name: 'Build roBrowserLegacy'

concurrency:
    group: ${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

on:
    pull_request:
        branches: ['master']

permissions:
    contents: read

jobs:
    build:
        name: 'Build and validate'
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: 'npm'

            - name: Install dependencies
              run: npm install

            - name: Build project
              run: npm run build

            - name: Validate dist/Web
              run: test -d dist/Web
