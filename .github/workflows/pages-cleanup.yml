name: Cleanup GitHub Pages on branch delete

concurrency:
    group: ${{ github.repository }}-${{ github.workflow }}-${{ github.event.ref }}
    cancel-in-progress: true

on:
    delete:

permissions:
    contents: write

jobs:
    cleanup:
        if: github.event.ref_type == 'branch'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout gh-pages
              uses: actions/checkout@v5
              with:
                  ref: gh-pages
                  fetch-depth: 0

            - name: Remove branch folder
              env:
                  DELETED_REF: ${{ github.event.ref }}
              run: |
                  SAFE_BRANCH="$(printf '%s' "$DELETED_REF" | tr '/' '-' | sed -E 's/[^A-Za-z0-9._-]+/-/g')"
                  if [ -z "$SAFE_BRANCH" ] || [ "$SAFE_BRANCH" = "." ] || [ "$SAFE_BRANCH" = ".." ]; then
                    exit 0
                  fi
                  rm -rf -- "$SAFE_BRANCH"

            - name: Generate branch index
              uses: ./.github/actions/generate-pages-index
              with:
                  pages-dir: .

            - name: Commit and push
              env:
                  DELETED_REF: ${{ github.event.ref }}
              run: |
                  set -euo pipefail
                  git config user.name "github-actions"
                  git config user.email "github-actions@github.com"

                  git add -A
                  if git diff --cached --quiet; then
                    exit 0
                  fi

                  git commit -m "Remove Pages for deleted branch $DELETED_REF" || true

                  for i in 1 2 3 4 5; do
                    if git push origin gh-pages; then
                      exit 0
                    fi
                    git fetch origin gh-pages
                    git pull --rebase origin gh-pages || (git rebase --abort || true)
                    SAFE_BRANCH="$(printf '%s' "$DELETED_REF" | tr '/' '-' | sed -E 's/[^A-Za-z0-9._-]+/-/g')"
                    if [ -n "$SAFE_BRANCH" ] && [ "$SAFE_BRANCH" != "." ] && [ "$SAFE_BRANCH" != ".." ]; then
                      rm -rf -- "$SAFE_BRANCH"
                    fi
                    bash .github/scripts/generate-pages-index.sh .
                    git add -A
                    git commit --amend --no-edit || git commit -m "Remove Pages for deleted branch $DELETED_REF"
                  done

                  exit 1
