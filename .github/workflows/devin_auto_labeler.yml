name: Devin PR Labeler
on:
    issue_comment:
        types: [created]
permissions:
    contents: read
    issues: write
    pull-requests: write
jobs:
    label_based_on_devin:
        if: github.event.issue.pull_request
        runs-on: ubuntu-latest
        steps:
            - name: Handle Devin Labels
              uses: actions/github-script@v7
              env:
                  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
              with:
                  script: |
                      const comment = (context.payload.comment.body || '').toLowerCase();
                      const issue_number = context.issue.number;
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      core.info('Comment text: ' + comment.substring(0, 500));
                      const allDevinLabels = [
                        'Devin Check Passed',
                        'Devin Check Failed - TOFIX',
                        'Devin Check Failed - WONTFIX'
                      ];
                      let labelToAdd = null;
                      if (comment.includes('no bugs found') || comment.includes('no issues found')) {
                        labelToAdd = 'Devin Check Passed';
                      } else if (comment.includes('🔴') || comment.includes('🟡') || comment.includes('potential issues')) {
                        labelToAdd = 'Devin Check Failed - TOFIX';
                      } else if (comment.includes('🚩')) {
                        labelToAdd = 'Devin Check Failed - WONTFIX';
                      }
                      core.info('Label to add: ' + labelToAdd);
                      if (labelToAdd) {
                        for (const label of allDevinLabels.filter(l => l !== labelToAdd)) {
                          try {
                            await github.rest.issues.removeLabel({ owner, repo, issue_number, name: label });
                          } catch (e) {}
                        }
                        await github.rest.issues.addLabels({
                          owner, repo, issue_number,
                          labels: [labelToAdd]
                        });
                      }
