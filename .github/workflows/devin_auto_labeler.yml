name: Devin PR Labeler - Analyze  
on:  
    pull_request_review:  
        types: [submitted]  
permissions:  
    contents: read  
jobs:  
    analyze_review:  
        if: github.event.pull_request  
        runs-on: ubuntu-latest  
        steps:  
            - name: Analyze Devin Review  
              uses: actions/github-script@v7  
              env:  
                  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  
              with:  
                  script: |  
                      const comment = (context.payload.review.body || '').toLowerCase();  
                      const issue_number = context.payload.pull_request.number;  
                      let labelToAdd = null;  
                      if (comment.includes('no bugs found') || comment.includes('no issues found') || comment.includes('found 0 new potential issue')) {  
                        labelToAdd = 'Devin Check Passed';  
                      } else if (comment.includes('new potential issue')) {  
                        labelToAdd = 'Devin Check Failed - TOFIX';  
                      } else if (comment.includes('🚩')) {  
                        labelToAdd = 'Devin Check Failed - WONTFIX';  
                      }  
                      core.info('Label to add: ' + labelToAdd);  
                      if (labelToAdd) {  
                        const fs = require('fs');  
                        fs.writeFileSync('label_data.json', JSON.stringify({ issue_number, labelToAdd }));  
                      }  
  
            - name: Upload label data  
              if: success()  
              uses: actions/upload-artifact@v4  
              with:  
                  name: label-data  
                  path: label_data.json  
                  retention-days: 1  
                  if-no-files-found: ignore
