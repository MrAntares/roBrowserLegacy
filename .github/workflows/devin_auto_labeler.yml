name: Devin PR Labeler
on:
  pull_request_review:
    types: [submitted]
permissions:
  contents: read
  issues: write
  pull-requests: write
jobs:
  label_based_on_devin:
    runs-on: ubuntu-latest
    steps:
      - name: Handle Devin Labels
        uses: actions/github-script@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          script: |
            const issue_number = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const review_id = context.payload.review.id;
            const reviewBody = (context.payload.review.body || '').toLowerCase();
            const comments = await github.rest.pulls.listReviewComments({
              owner, repo,
              pull_number: issue_number
            });
            const reviewComments = comments.data
              .filter(c => c.pull_request_review_id === review_id)
              .map(c => c.body.toLowerCase());
            const allText = [reviewBody, ...reviewComments].join(' ');
            core.info('Combined review text: ' + allText.substring(0, 500));
            const allDevinLabels = [
              'Devin Check Passed',
              'Devin Check Failed - TOFIX',
              'Devin Check Failed - WONTFIX'
            ];
            let labelToAdd = null;
            if (allText.includes('no bugs found') || allText.includes('no issues found')) {
              labelToAdd = 'Devin Check Passed';
            } else if (allText.includes('🔴') || allText.includes('🟡')) {
              labelToAdd = 'Devin Check Failed - TOFIX';
            } else if (allText.includes('🚩')) {
              labelToAdd = 'Devin Check Failed - WONTFIX';
            }
            core.info('Label to add: ' + labelToAdd);
            if (labelToAdd) {
              for (const label of allDevinLabels.filter(l => l !== labelToAdd)) {
                try {
                  await github.rest.issues.removeLabel({ owner, repo, issue_number, name: label });
                } catch (e) {}
              }
              await github.rest.issues.addLabels({
                owner, repo, issue_number,
                labels: [labelToAdd]
              });
            }