<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Branch Demo Browser</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;max-width:980px;margin:40px auto;padding:0 16px;}
    h1{margin:0 0 8px;}
    .hint{color:#666;margin:0 0 24px;}
    .featured{display:flex;gap:12px;flex-wrap:wrap;margin:18px 0 26px;}
    .pill{display:inline-flex;align-items:center;gap:10px;padding:12px 14px;border-radius:999px;border:1px solid #ddd;background:#fff;text-decoration:none;color:#111;font-weight:700;}
    .pill:hover{border-color:#999;}
    .tag{font-size:12px;padding:2px 8px;border-radius:999px;background:#e8b84b;color:#111;font-weight:800;}
    ul{list-style:none;padding:0;margin:0;}
    li{margin:10px 0;padding:12px 14px;border:1px solid #ddd;border-radius:10px;display:flex;justify-content:space-between;gap:12px;align-items:center;}
    a{color:#0969da;text-decoration:none;font-weight:600;}
    a:hover{text-decoration:underline;}
    .name{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13px;color:#111;}
  </style>
</head>
<body>
  <h1>Branch Demo Browser</h1>
  <p class="hint">Available deployed branch previews (folders on <code>gh-pages</code>).</p>
  <div class="featured">
    <a class="pill" href="./master/"><span class="tag">MASTER</span><span>Open master demo</span></a>
  </div>
  <ul>
  </ul>
</body>
</html>
