<!doctype html>
<html>
	<head>
		<meta charset="UTF-8" />
		<title>roBrowserLegacy</title>
		<link rel="icon" type="./icon.png" />

		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
		<meta name="HandheldFriendly" content="true" />

		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="roBrowser" />
		<meta name="mobile-web-app-capable" content="yes" />

		<meta name="description" content="roBrowser" />
		<meta name="keywords" content="roBrowser" />
		<meta name="author" content="roBrowser" />
		<meta name="robots" content="index" />

		<meta name="theme-color" content="#ff8cb5" />

		<meta property="og:title" content="roBrowser" />
		<meta property="og:description" content="roBrowser" />
		<meta property="og:type" content="website" />
		<meta property="og:locale" content="en_US" />

		<link rel="apple-touch-icon" href="./icon.png" />
		<script type="text/javascript">
			const url = new URL(window.location.href);
			const path = url.pathname;
			const projectRoot = path.split('/applications/')[0] + '/';

			const importMap = {
				imports: {
					'src/': projectRoot + 'src/',
					'App/': projectRoot + 'src/App/',
					'Audio/': projectRoot + 'src/Audio/',
					'Controls/': projectRoot + 'src/Controls/',
					'Core/': projectRoot + 'src/Core/',
					'DB/': projectRoot + 'src/DB/',
					'Engine/': projectRoot + 'src/Engine/',
					'Loaders/': projectRoot + 'src/Loaders/',
					'Network/': projectRoot + 'src/Network/',
					'Plugins/': projectRoot + 'src/Plugins/',
					'Preferences/': projectRoot + 'src/Preferences/',
					'Renderer/': projectRoot + 'src/Renderer/',
					'UI/': projectRoot + 'src/UI/',
					'Utils/': projectRoot + 'src/Utils/',
					'Vendors/': projectRoot + 'src/Vendors/'
				}
			};

			const s = document.createElement('script');
			s.type = 'importmap';
			s.textContent = JSON.stringify(importMap);
			document.currentScript.after(s);
		</script>
		<script type="module">
			addEventListener(
				'message',
				function OnMessage(event) {
					// Only accept messages from the parent window or opener (the page that loaded us)
					if (event.source !== window.parent && event.source !== window.opener) {
						return;
					}

					removeEventListener('message', OnMessage, false);

					window.ROConfig = event.data;

					// Load the engine entry point as an ES6 module
					import('../../src/main.js')
						.then(() => {
							event.source.postMessage('ready', '*');
						})
						.catch(err => {
							console.error('Failed to load roBrowser engine:', err);
						});
				},
				false
			);
		</script>
	</head>
</html>
