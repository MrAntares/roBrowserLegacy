<!doctype html>
<html>
	<head>
		<meta charset="UTF-8" />
		<title>roBrowserLegacy</title>
		<link rel="icon" type="./icon.png" />

		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
		<meta name="HandheldFriendly" content="true" />

		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="roBrowser" />
		<meta name="mobile-web-app-capable" content="yes" />

		<meta name="description" content="roBrowser" />
		<meta name="keywords" content="roBrowser" />
		<meta name="author" content="roBrowser" />
		<meta name="robots" content="index" />

		<meta name="theme-color" content="#ff8cb5" />

		<meta property="og:title" content="roBrowser" />
		<meta property="og:description" content="roBrowser" />
		<meta property="og:type" content="website" />
		<meta property="og:locale" content="en_US" />

		<link rel="apple-touch-icon" href="./icon.png" />

		<style>
			html,
			body {
				margin: 0;
				padding: 0;
				border: 0;
				height: 100%;
				width: 100%;
				overflow: hidden;
			}
			#ro-preloader {
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				z-index: 99999;
				background: rgba(6, 8, 16, 0.97);
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 18px;
			}
			#ro-preloader.fade-out {
				opacity: 0;
				transition: opacity 0.3s ease;
			}
			.pre-spinner {
				width: 48px;
				height: 48px;
				border: 4px solid rgba(232, 184, 75, 0.2);
				border-top-color: #e8b84b;
				border-radius: 50%;
				animation: ro-spin 0.8s linear infinite;
			}
			@keyframes ro-spin {
				to {
					transform: rotate(360deg);
				}
			}
			.pre-text {
				font-family: 'Cinzel', serif;
				font-size: 16px;
				letter-spacing: 3px;
				text-transform: uppercase;
				color: #e8b84b;
				display: flex;
				gap: 2px;
			}
			.pre-text span {
				animation: ro-wave 1.2s ease-in-out infinite;
				animation-delay: calc(var(--i) * 0.08s);
			}
			@keyframes ro-wave {
				0%,
				100% {
					opacity: 0.4;
					transform: translateY(0);
				}
				50% {
					opacity: 1;
					transform: translateY(-4px);
				}
			}
		</style>

		<script src="../shared/importmap.js"></script>

		<script type="module">
			addEventListener(
				'message',
				function OnMessage(event) {
					// Only accept messages from the parent window or opener (the page that loaded us)
					if (event.source !== window.parent && event.source !== window.opener) {
						return;
					}

					removeEventListener('message', OnMessage, false);

					window.ROConfig = event.data;

					// Load the engine entry point as an ES6 module
					import('../../src/main.js')
						.then(() => {
							event.source.postMessage('ready', '*');
						})
						.catch(err => {
							console.error('Failed to load roBrowser engine:', err);
						});
				},
				false
			);
		</script>
	</head>
	<body>
		<div id="ro-preloader">
			<div class="pre-spinner"></div>
			<p class="pre-text">
				<span style="--i: 0">L</span><span style="--i: 1">o</span><span style="--i: 2">a</span
				><span style="--i: 3">d</span><span style="--i: 4">i</span><span style="--i: 5">n</span
				><span style="--i: 6">g</span><span style="--i: 7">.</span><span style="--i: 8">.</span
				><span style="--i: 9">.</span>
			</p>
		</div>
	</body>
</html>
