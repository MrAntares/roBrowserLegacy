<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>roBrowser — World (.rsw) Tester</title>
</head>
<body>
  <script type="module">
    window.ROConfig = { servers: [{ packetver: 0 }], packetver: 0 };

    import FileTester from './FileTester.js';
    import World from 'Loaders/World.js';

    const ft = new FileTester('rsw', data => {
      const rsw = new World(data);
      rsw.compile();
    });

    ft.start();
  </script>
