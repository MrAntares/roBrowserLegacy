<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>roBrowser — Altitude (.gat) Tester</title>
</head>
<body>
  <script type="module">
    window.ROConfig = { servers: [{ packetver: 0 }], packetver: 0 };

    import FileTester from './FileTester.js';
    import Altitude from 'Loaders/Altitude.js';

    const ft = new FileTester('gat', data => {
      const gat = new Altitude(data);
      gat.compile();
    });

    ft.start();
  </script>
</body>
</html>
