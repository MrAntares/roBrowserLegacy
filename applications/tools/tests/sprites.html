<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>roBrowser — Sprite (.spr) Tester</title>
</head>
<body>
  <script src="../../shared/importmap.js" data-project-root-split="/applications/"></script>

  <script type="module">
    window.ROConfig = { servers: [{ packetver: 0 }], packetver: 0 };

    import FileTester from './FileTester.js';
    import Sprite from 'Loaders/Sprite.js';

    const ft = new FileTester('spr', data => {
      const spr = new Sprite(data);
      spr.compile();
    });

    ft.start();
  </script>
</body>
</html>
