<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>roBrowser — Sprite (.spr) Tester</title>
</head>
<body>
  <script src="../../../shared/importmap.js"></script>
  <script>
    const projectRoot = new URL(window.location.href).pathname.split('/applications/')[0] + '/';
    const s = document.createElement('script');
    s.type = 'importmap';
    s.textContent = JSON.stringify(createROImportMap(projectRoot));
    document.currentScript.after(s);
  </script>
  <script type="module">
    window.ROConfig = { servers: [{ packetver: 0 }], packetver: 0 };

    import FileTester from './FileTester.js';
    import Sprite from 'Loaders/Sprite.js';

    const ft = new FileTester('spr', data => {
      const spr = new Sprite(data);
      spr.compile();
    });

    ft.start();
  </script>
</body>
</html>
