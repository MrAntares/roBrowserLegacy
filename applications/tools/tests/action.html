<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>roBrowser — Action (.act) Tester</title>
</head>
<body>
  <script src="../../shared/importmap.js" data-project-root-split="/applications/"></script>

  <script type="module">
    // Stub ROConfig so PacketVerManager doesn't throw before the thread loads
    window.ROConfig = { servers: [{ packetver: 0 }], packetver: 0 };

    import FileTester from './FileTester.js';
    import Action from 'Loaders/Action.js';

    const ft = new FileTester('act', data => {
      new Action(data);
    });

    ft.start();
  </script>
</body>
</html>
