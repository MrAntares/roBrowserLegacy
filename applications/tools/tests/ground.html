<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>roBrowser — Ground (.gnd) Tester</title>
</head>
<body>
  <script src="../../shared/importmap.js" data-project-root-split="/applications/"></script>

  <script type="module">
    window.ROConfig = { servers: [{ packetver: 0 }], packetver: 0 };

    import FileTester from './FileTester.js';
    import Ground from 'Loaders/Ground.js';

    const ft = new FileTester('gnd', data => {
      const gnd = new Ground(data);
      gnd.compile();
    });

    ft.start();
  </script>
</body>
</html>
