<!DOCTYPE html>    
<html>    
    <head>    
        <meta charset="UTF-8">    
        <title>roBrowserLegacy</title>    
        <style>    
            html, body {    
                margin: 0; padding: 0; border: 0;    
                height: 100%; width: 100%; overflow: hidden;    
            }    
            #ro-preloader {    
                position: fixed;    
                top: 0; left: 0;    
                width: 100%; height: 100%;    
                z-index: 99999;    
                background: rgba(6, 8, 16, 0.97);    
                display: flex;    
                align-items: center;    
                justify-content: center;    
                flex-direction: column;    
            }    
            #ro-preloader .pre-spinner {    
                width: 48px; height: 48px;    
                margin: 0 auto 16px;    
                border: 4px solid rgba(232, 184, 75, 0.2);    
                border-top-color: #e8b84b;    
                border-radius: 50%;    
                animation: ro-pre-spin 0.8s linear infinite;    
            }    
            #ro-preloader .pre-text {    
                font-family: serif;    
                font-size: 16px;    
                letter-spacing: 3px;    
                text-transform: uppercase;    
                color: #e8b84b;    
            }    
            #ro-preloader .pre-text span {    
                display: inline-block;    
                animation: ro-pre-wave 1.2s ease-in-out infinite;    
                animation-delay: calc(var(--i) * 0.08s);    
            }    
            @keyframes ro-pre-spin {    
                to { transform: rotate(360deg); }    
            }    
            @keyframes ro-pre-wave {    
                0%, 60%, 100% { transform: translateY(0); }    
                30% { transform: translateY(-8px); }    
            }    
            #ro-preloader.fade-out {    
                opacity: 0;    
                transition: opacity 0.3s ease;    
            }    
        </style>    
    </head>    
    <body>    
        <div id="ro-preloader">    
            <div class="pre-spinner"></div>    
            <p class="pre-text">    
                <span style="--i:0">L</span><span style="--i:1">o</span><span style="--i:2">a</span><span style="--i:3">d</span><span style="--i:4">i</span><span style="--i:5">n</span><span style="--i:6">g</span><span style="--i:7">.</span><span style="--i:8">.</span><span style="--i:9">.</span>    
            </p>    
        </div>    
    
        <script src="Config.js"></script>    
        <script>    
            (function() {    
                var script = document.createElement('script');    
                script.src = 'Config.local.js';    
                script.onerror = function() {    
                    console.log('Config.local.js not found, using defaults from Config.js');    
                };    
                document.head.appendChild(script);    
            })();    
        </script>    
        <script>    
            function deepMerge(target, source) {    
                for (var key in source) {    
                    if (source.hasOwnProperty(key)) {    
                        if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])) {    
                            target[key] = deepMerge(target[key] || {}, source[key]);    
                        } else {    
                            target[key] = source[key];    
                        }    
                    }    
                }    
                return target;    
            }    
    
            var APP_SCRIPTS = {    
                1: 'Online.js',    
                2: 'MapViewer.js',    
                3: 'GrfViewer.js',    
                4: 'ModelViewer.js',    
                5: 'StrViewer.js',    
                6: 'GrannyModelViewer.js',    
                7: 'EffectViewer.js'    
            };    
    
            addEventListener('message', function OnMessage(event) {    
                if (event.source !== window.parent && event.source !== window.opener) {    
                    return;    
                }    
                removeEventListener('message', OnMessage, false);    
    
                var config = deepMerge({}, window.ROConfigBase || {});    
                if (window.ROConfigLocal) {    
                    config = deepMerge(config, window.ROConfigLocal);    
                }    
                config = deepMerge(config, event.data);    
                window.ROConfig = config;    
    
                var appId = parseInt(config.application, 10) || 1;    
                var scriptFile = APP_SCRIPTS[appId] || 'Online.js';    
    
                import('./' + scriptFile).then(function(mod) {    
                    if (typeof mod.default === 'function') {    
                        mod.default();    
                    }    
                    event.source.postMessage('ready', '*');    
                }).catch(function(err) {    
                    console.error('Failed to load app:', scriptFile, err);    
                });    
            }, false);    
        </script>    
    </body>    
</html>
