<div id="PartyMemberExternal" data-background="renewalparty/img_partymini_bg.tga">
	<button
		class="close"
		data-background="renewalparty/btn_titlebar_maximum_out.bmp"
		data-hover="renewalparty/btn_titlebar_maximum_over.bmp"
		data-down="renewalparty/btn_titlebar_maximum_press.bmp"
	></button>
	<div class="job-icon-container">
		<div class="job-icon"></div>
		<div class="crown"></div>
	</div>
	<div class="info-container">
		<div class="row1">
			<span class="level"></span>
			<span class="name"></span>
			<span class="map"></span>
		</div>
		<div class="row2">
			<div class="hp-bar-container">
				<canvas class="life" width="75" height="5"></canvas>
			</div>
			<span class="hp-text"></span>
			<div class="status-icon"></div>
		</div>
	</div>
</div>
