<div class="Navigation">
	<div class="titlebar">
		<ui-image class="left" src="basic_interface/titlebar_left.bmp"></ui-image>
		<ui-image class="center" src="basic_interface/titlebar_mid.bmp"></ui-image>
		<ui-image class="right" src="basic_interface/titlebar_right.bmp"></ui-image>
		<div class="title">Navigation</div>
		<ui-button
			class="close"
			bg="basic_interface/sys_close_off.bmp"
			hover="basic_interface/sys_close_on.bmp"
		></ui-button>
	</div>
	<div class="content">
		<div class="search-container">
			<select class="search-type">
				<option value="ALL">ALL</option>
				<option value="NPC">NPC</option>
				<option value="MOB">MOB</option>
			</select>
			<ui-image class="search-left" src="basic_interface/txtbox_l.bmp"></ui-image>
			<ui-image class="search-middle" src="basic_interface/txtbox_m.bmp"></ui-image>
			<ui-image class="search-right" src="basic_interface/txtbox_r.bmp"></ui-image>
			<input type="text" class="search-input" placeholder="Search..." />
			<ui-button
				class="search-button"
				bg="navigation_interface/navisearch_a.bmp"
				hover="navigation_interface/navisearch_b.bmp"
				down="navigation_interface/navisearch_c.bmp"
			></ui-button>
		</div>
		<div class="map-container">
			<div class="services-toggle-container">
				<label class="services-checkbox"> <input type="checkbox" class="services-toggle" /> Services </label>
			</div>
			<div class="location-title"></div>
			<div class="map-display">
				<!-- Map will be displayed here -->
			</div>
		</div>
	</div>
	<div class="footer">
		<div class="coordinates-bar">
			<div class="map-name"></div>
			<div class="mouse-info">
				<span class="mouse-label">Mouse:</span>
				<span class="mouse-coordinates"></span>
			</div>
			<div class="target-info">
				<span class="target-label">Target:</span>
				<span class="target-coordinates"></span>
			</div>
		</div>
	</div>
</div>
