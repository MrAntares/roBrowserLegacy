<div id="Clan">
	<div class="titlebar">
		<ro-image src="basic_interface/titlebar_mid.bmp"></ro-image>
		<div class="right">
			<ro-button
				class="base close"
				bg="basic_interface/sys_close_off.bmp"
				hover="basic_interface/sys_close_on.bmp"
			></ro-button>
		</div>
		<div class="clear"></div>
	</div>

	<div class="tabs">
		<button class="info active"><ro-text msg="2355">Clan Info</ro-text></button>
	</div>

	<div class="panel">
		<div class="content info">
			<div class="name"><ro-text msg="2357">Clan Name</ro-text> : <span class="value"></span></div>
			<div class="level"><ro-text msg="2356">Clan level</ro-text> : <span class="value"></span></div>
			<div class="master"><ro-text msg="2362">Master Name</ro-text> : <span class="value"></span></div>
			<div class="members">
				<ro-text msg="2363">The number of members</ro-text> :
				<span class="maxMember">0</span>
				<ro-button bg="basic_interface/grp_online.bmp"></ro-button>
				<span class="online"></span>
			</div>
			<div class="territory"><ro-text msg="2364">Managed Territory</ro-text> : <span class="value"></span></div>
			<div class="clan_illust"></div>
			<div class="emblem"><ro-text msg="2358">Clan mark</ro-text></div>
			<div class="emblem_container"></div>
			<div class="ally"><ro-text msg="2359">Ally Clan</ro-text></div>
			<div class="ally_list"></div>
			<div class="hostile"><ro-text msg="2360">Hostile Clan</ro-text></div>
			<div class="hostile_list"></div>
		</div>
	</div>

	<div class="footer">
		<ro-image src="basic_interface/btnbar_mid2.bmp"></ro-image>
		<ro-button class="btn_ok" bg="btn_ok.bmp" hover="btn_ok_a.bmp" down="btn_ok_b.bmp"></ro-button>
	</div>
</div>
